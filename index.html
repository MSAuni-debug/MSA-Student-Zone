<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e0deda;
      border-radius: 14px;
      padding: 2.25rem 2.5rem;
      width: 100%;
      max-width: 380px;
    }
    .header { text-align: center; margin-bottom: 2rem; }
    .avatar {
      width: 50px; height: 50px; border-radius: 50%;
      background: #f4f4f0; border: 1px solid #e0deda;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .avatar svg { color: #888; stroke: #888; }
    h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: 9px 12px; font-size: 14px;
      border: 1px solid #e0deda; border-radius: 8px;
      outline: none; background: #fff; color: #1a1a1a;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #aaa; }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 40px; }
    .toggle-btn {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 0; color: #aaa;
    }
    .error {
      display: none; background: #fff0f0; border: 1px solid #fcc;
      border-radius: 8px; padding: 10px 12px; font-size: 13px;
      color: #c00; margin-bottom: 1rem;
    }
    .btn {
      width: 100%; padding: 10px; font-size: 14px; font-weight: 500;
      cursor: pointer; background: #1a1a1a; color: #fff;
      border: none; border-radius: 8px; transition: background 0.15s;
    }
    .btn:hover { background: #333; }
    .footer-text { text-align: center; font-size: 12px; color: #aaa; margin-top: 1.25rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="avatar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your account</p>
    </div>
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Enter your password" />
        <button class="toggle-btn" onclick="togglePassword()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="error" id="error-msg">Incorrect username or password.</div>
    <button class="btn" onclick="handleLogin()">Sign in</button>
    <p class="footer-text">Forgot your password? <span style="color:#555; cursor:pointer;">Reset it</span></p>
  </div>

  <script>
    const USERS = { "232021": "Ihf30032005" };

    function handleLogin() {
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;
      const err = document.getElementById('error-msg');
      if (USERS[u] && USERS[u] === p) {
        sessionStorage.setItem('loggedIn', 'true');
        window.location.href = 'page_2.html';
      } else {
        err.style.display = 'block';
      }
    }

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
